# ============================================================
# terraform.yml — Création / Destruction du cluster EKS
# Déclenchement : MANUEL UNIQUEMENT (workflow_dispatch)
# ============================================================

name: "🏗️ Terraform — EKS Cluster"

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action à effectuer'
        type: choice
        options:
          - apply
          - destroy
        default: apply

env:
  AWS_REGION: us-east-1
  EKS_CLUSTER_NAME: plateforme-paiement-eks
  NAMESPACE: plateforme-electronique

permissions:
  contents: read

jobs:
  terraform:
    name: "🏗️ Terraform ${{ github.event.inputs.action }}"
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        shell: bash
        working-directory: terraform

    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4

      - name: Configurer les credentials AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Vérifier l'identité AWS
        run: aws sts get-caller-identity

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      # ============================================================
      # APPLY — Créer le cluster
      # ============================================================
      - name: Terraform Plan
        if: github.event.inputs.action == 'apply'
        run: |
          terraform plan \
            -input=false \
            -var="aws_region=${{ env.AWS_REGION }}" \
            -var="cluster_name=${{ env.EKS_CLUSTER_NAME }}" \
            -out=tfplan
        env:
          TF_LOG: WARN

      - name: Terraform Apply
        if: github.event.inputs.action == 'apply'
        run: |
          STATUS=$(aws eks describe-cluster \
            --name "$EKS_CLUSTER_NAME" \
            --region "$AWS_REGION" \
            --query 'cluster.status' \
            --output text 2>/dev/null || echo "NOT_FOUND")

          if [ "$STATUS" = "ACTIVE" ]; then
            echo "✅ Cluster '$EKS_CLUSTER_NAME' déjà ACTIVE — rien à faire"
          else
            echo "=== Création du cluster EKS ==="
            terraform apply -auto-approve -input=false tfplan
            echo "✅ Cluster créé"
            terraform output
          fi
        env:
          TF_LOG: WARN

      # ============================================================
      # DESTROY — Nettoyage K8s puis destruction Terraform
      # ============================================================

      # ── Étape 1 : Configurer kubectl ─────────────────────────────
      - name: "[Destroy 1/5] Configurer kubectl"
        if: github.event.inputs.action == 'destroy'
        run: |
          aws eks update-kubeconfig \
            --region "$AWS_REGION" \
            --name "$EKS_CLUSTER_NAME" 2>/dev/null \
          && echo "✅ kubectl configuré" \
          || echo "⚠️  Cluster inaccessible — poursuite quand même"
        working-directory: .

      # ── Étape 2 : Supprimer les Services LoadBalancer ────────────
      # (si non supprimés, AWS laisse les ELB orphelins et bloque le VPC)
      - name: "[Destroy 2/5] Supprimer les LoadBalancers"
        if: github.event.inputs.action == 'destroy'
        run: |
          echo "=== Suppression des Services LoadBalancer ==="
          kubectl get svc -n "$NAMESPACE" \
            -o jsonpath='{.items[?(@.spec.type=="LoadBalancer")].metadata.name}' \
          | tr ' ' '\n' | while read SVC; do
            [ -z "$SVC" ] && continue
            echo "  🗑  Suppression LoadBalancer : $SVC"
            kubectl delete svc "$SVC" -n "$NAMESPACE" --timeout=60s || true
          done
          echo "  ⏳ Attente suppression ELB AWS (30s)..."
          sleep 30
          echo "✅ LoadBalancers supprimés"
        working-directory: .

      # ── Étape 3 : Supprimer les PVCs ─────────────────────────────
      # (libère les volumes EBS avant destroy sinon ils restent orphelins)
      - name: "[Destroy 3/5] Supprimer les PVCs et PVs"
        if: github.event.inputs.action == 'destroy'
        run: |
          echo "=== Suppression des PersistentVolumeClaims ==="
          kubectl delete pvc --all -n "$NAMESPACE" --timeout=60s || true

          echo "=== Suppression des PersistentVolumes ==="
          kubectl get pv \
            -o jsonpath='{.items[?(@.spec.claimRef.namespace=="plateforme-electronique")].metadata.name}' \
          | tr ' ' '\n' | while read PV; do
            [ -z "$PV" ] && continue
            echo "  🗑  Suppression PV : $PV"
            kubectl delete pv "$PV" --timeout=60s || true
          done

          echo "  ⏳ Attente suppression volumes EBS (20s)..."
          sleep 20
          echo "✅ PVCs et PVs supprimés"
        working-directory: .

      # ── Étape 4 : Supprimer le namespace entier ──────────────────
      - name: "[Destroy 4/5] Supprimer le namespace"
        if: github.event.inputs.action == 'destroy'
        run: |
          echo "=== Suppression du namespace $NAMESPACE ==="
          kubectl delete namespace "$NAMESPACE" --timeout=120s || true
          echo "✅ Namespace supprimé"
        working-directory: .

      # ── Étape 5 : Terraform destroy ──────────────────────────────
      - name: "[Destroy 5/5] Terraform Destroy"
        if: github.event.inputs.action == 'destroy'
        run: |
          echo "=== Import des ressources dans l'état Terraform ==="

          # Importer le cluster
          terraform import \
            -var="aws_region=$AWS_REGION" \
            -var="cluster_name=$EKS_CLUSTER_NAME" \
            aws_eks_cluster.main "$EKS_CLUSTER_NAME" 2>/dev/null || true

          # Importer le node group
          terraform import \
            -var="aws_region=$AWS_REGION" \
            -var="cluster_name=$EKS_CLUSTER_NAME" \
            aws_eks_node_group.workers "$EKS_CLUSTER_NAME:workers" 2>/dev/null || true

          # Importer les addons
          declare -A ADDON_MAP=(
            ["vpc-cni"]="vpc_cni"
            ["coredns"]="coredns"
            ["kube-proxy"]="kube_proxy"
            ["aws-ebs-csi-driver"]="ebs_csi"
          )
          for ADDON in "${!ADDON_MAP[@]}"; do
            RESOURCE="${ADDON_MAP[$ADDON]}"
            aws eks describe-addon \
              --cluster-name "$EKS_CLUSTER_NAME" \
              --addon-name "$ADDON" \
              --region "$AWS_REGION" \
              --query 'addon.status' \
              --output text 2>/dev/null | grep -q "ACTIVE" && \
            terraform import \
              -var="aws_region=$AWS_REGION" \
              -var="cluster_name=$EKS_CLUSTER_NAME" \
              "aws_eks_addon.${RESOURCE}" \
              "$EKS_CLUSTER_NAME:$ADDON" 2>/dev/null || true
          done

          echo ""
          echo "=== Terraform Destroy ==="
          terraform destroy \
            -auto-approve \
            -input=false \
            -var="aws_region=$AWS_REGION" \
            -var="cluster_name=$EKS_CLUSTER_NAME"

          echo "✅ Cluster EKS détruit proprement"
        env:
          TF_LOG: WARN

      # ── Résumé final ─────────────────────────────────────────────
      - name: Résumé
        if: always()
        run: |
          STATUS=$(aws eks describe-cluster \
            --name "$EKS_CLUSTER_NAME" \
            --region "$AWS_REGION" \
            --query 'cluster.status' \
            --output text 2>/dev/null || echo "NOT_FOUND / DELETED")
          echo "=== Statut final du cluster : $STATUS ==="
        working-directory: .
